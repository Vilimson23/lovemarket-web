<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>love.me | Магазин нового поколения</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b2cf5; 
            --primary-soft: #f4ebff;
            --dark: #121212;
            --gray: #f5f5f7;
            --text-main: #1d1d1f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Manrope', sans-serif; }
        body { background: #fff; color: var(--text-main); overflow-x: hidden; scroll-behavior: smooth; }

        /* HEADER & NAV */
        header {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            background: rgba(255, 255, 255, 0.8); backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            display: flex; justify-content: space-between; align-items: center; padding: 15px 5%;
        }
        .logo { display: flex; align-items: center; gap: 10px; cursor: pointer; text-decoration: none; color: var(--text-main); }
        .logo-icon { width: 32px; height: 32px; background: var(--primary); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        .logo-text { font-size: 22px; font-weight: 800; }

        .nav-links { display: flex; gap: 30px; }
        .nav-links a { text-decoration: none; color: var(--text-main); font-weight: 500; font-size: 14px; transition: 0.3s; }
        .nav-links a:hover { color: var(--primary); }

        .header-actions { display: flex; align-items: center; gap: 20px; }
        .cart-btn { position: relative; cursor: pointer; background: var(--gray); padding: 10px 18px; border-radius: 50px; border: none; font-weight: 600; }
        .cart-badge { position: absolute; top: -5px; right: -5px; background: var(--primary); color: white; width: 20px; height: 20px; border-radius: 50%; font-size: 11px; display: flex; align-items: center; justify-content: center; }

        /* VIEWS CONTROL */
        .view { display: none; padding-top: 80px; min-height: 100vh; animation: fadeIn 0.5s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* HERO SECTION (HOME) */
        .hero { height: 90vh; display: flex; align-items: center; padding: 0 10%; background: var(--gray); position: relative; overflow: hidden; }
        .hero-content { z-index: 2; max-width: 600px; }
        .hero-content h1 { font-size: clamp(3rem, 6vw, 5rem); line-height: 1.1; margin-bottom: 25px; font-weight: 800; }
        .hero-content p { font-size: 1.2rem; color: #6e6e73; margin-bottom: 40px; }
        .btn-main { background: var(--primary); color: white; padding: 18px 45px; border-radius: 50px; text-decoration: none; font-weight: 700; font-size: 18px; display: inline-block; transition: 0.3s; border: none; cursor: pointer; }
        .btn-main:hover { transform: scale(1.05); box-shadow: 0 15px 30px rgba(139, 44, 245, 0.3); }

        .hero-img { position: absolute; right: -100px; top: 50%; transform: translateY(-50%); width: 50%; height: 80%; background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%); border-radius: 40px; }

        /* CATALOG LAYOUT */
        .catalog-container { display: grid; grid-template-columns: 280px 1fr; gap: 40px; padding: 40px 5%; }
        .sidebar { position: sticky; top: 120px; height: fit-content; }
        .filter-box { background: var(--gray); padding: 25px; border-radius: 20px; }
        .filter-box h3 { margin-bottom: 20px; font-size: 18px; }
        .filter-item { display: block; margin-bottom: 12px; cursor: pointer; color: #444; }

        .search-wrapper { margin-bottom: 30px; }
        .search-input { width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 12px; font-size: 16px; outline: none; }
        .search-input:focus { border-color: var(--primary); }

        /* PRODUCT CARDS */
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        .card { background: #fff; border: 1px solid #f0f0f0; border-radius: 24px; padding: 20px; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.08); }
        .card-img { width: 100%; height: 280px; object-fit: cover; border-radius: 18px; margin-bottom: 20px; background: #eee; }
